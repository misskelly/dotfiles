# Starship config
# Docs: https://starship.rs/config/

# Prompt format -- what shows on the left
format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$cmd_duration\
$line_break\
$character"""

# -------------------------------------------
# Directory
# -------------------------------------------
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

# -------------------------------------------
# Git
# -------------------------------------------
[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
untracked = "?${count}"
staged = "+${count}"
deleted = "✘${count}"

# -------------------------------------------
# Node (only shows when relevant)
# -------------------------------------------
[nodejs]
symbol = " "
style = "bold green"
detect_files = ["package.json", ".nvmrc"]

# -------------------------------------------
# Command duration
# Shows how long a command took if > 2 seconds
# -------------------------------------------
[cmd_duration]
min_time = 2_000
format = "took [$duration](bold yellow) "

# -------------------------------------------
# The prompt character (> normally, red X on error)
# -------------------------------------------
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"